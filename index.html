<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Alien Sighting Form - Secure Portal</title>
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="favicon_io/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="favicon_io/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="favicon_io/favicon-16x16.png"
        />
        <link rel="manifest" href="favicon_io/site.webmanifest" />
        <link rel="stylesheet" href="css/ui-jquery.css" />
        <link rel="stylesheet" href="css/alien.css" />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js"></script>
        <link
            rel="stylesheet"
            href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css"
        />
        <script src="js/aliensightinglog.js" defer></script>
    </head>
    <body>
        <div class="container">
            <form id="alienForm">
                <header>
                    <img
                        src="images/aliens.png"
                        width="80"
                        height="40"
                        alt="Logo"
                    />
                    <h1 class="ui-state-default ui-corner-all">
                        UAP BIOMETRIC LOG
                    </h1>
                </header>

                <div class="form-grid">
                    <div class="column">
                        <section>
                            <h3>Temporal Stamp</h3>
                            <div class="yellow-box" id="datepicker"></div>
                        </section>
                        <section>
                            <h3>Morphology</h3>
                            <div class="yellow-box short-box">
                                <fieldset id="creatureType">
                                    <input
                                        type="radio"
                                        name="ct"
                                        id="sponge"
                                    /><label for="sponge">Sponge</label>
                                    <input
                                        type="radio"
                                        name="ct"
                                        id="worm"
                                        checked
                                    /><label for="worm">Worm</label>
                                    <input
                                        type="radio"
                                        name="ct"
                                        id="insect"
                                    /><label for="insect">Insect</label>
                                    <input
                                        type="radio"
                                        name="ct"
                                        id="fish"
                                    /><label for="fish">Fish</label>
                                </fieldset>
                            </div>
                        </section>
                    </div>

                    <div class="column">
                        <section>
                            <h3>Anatomical Metrics</h3>
                            <div class="yellow-box">
                                <div class="spinner-group">
                                    <div>
                                        Eyes<br /><input
                                            id="spinnereyes"
                                            value="5"
                                        />
                                    </div>
                                    <div>
                                        Arms<br /><input
                                            id="spinnerarms"
                                            value="0"
                                        />
                                    </div>
                                    <div>
                                        Legs<br /><input
                                            id="spinnerlegs"
                                            value="5"
                                        />
                                    </div>
                                </div>
                                <div class="stat-item">
                                    <p style="margin: 5px 0">
                                        Mass:
                                        <span
                                            id="w-label"
                                            style="
                                                color: #f6931f;
                                                font-weight: bold;
                                            "
                                            >20 kg</span
                                        >
                                    </p>
                                    <div id="slider"></div>
                                </div>
                                <div class="stat-item">
                                    <p style="margin: 12px 0 5px 0">
                                        Height:
                                        <span
                                            id="h-label"
                                            style="
                                                color: #f6931f;
                                                font-weight: bold;
                                            "
                                            >2 m</span
                                        >
                                    </p>
                                    <div id="slider2"></div>
                                </div>
                            </div>
                        </section>

                        <section>
                            <h3>Visual Spectrum</h3>
                            <div class="yellow-box short-box">
                                <div class="sliders-wrap">
                                    <p class="color-label">RED CHROMA</p>
                                    <div id="red"></div>
                                    <p class="color-label">GREEN CHROMA</p>
                                    <div id="green"></div>
                                    <p class="color-label">BLUE CHROMA</p>
                                    <div id="blue"></div>
                                </div>
                                <div id="swatch"></div>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="thematic-divider">
                    <div class="divider-marker">ID</div>
                </div>

                <div class="footer">
                    <button
                        id="submit-btn"
                        type="button"
                        class="ui-button ui-corner-all"
                    >
                        SUBMIT ENCRYPTED DATA
                    </button>
                </div>
            </form>
        </div>

        <div id="dialog" title="Transmission Preview">
            <div id="results"></div>
        </div>
    </body>
</html>
